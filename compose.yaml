services:
  postgres:
    image: postgres:16-alpine
    container_name: pawmap-postgres
    environment:
      POSTGRES_DB: pawmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pawmap-postgres-data:/var/lib/postgresql/data
      - ./apps/api/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawmap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pawmap-postgres-data:
