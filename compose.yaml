services:
  postgres:
    image: postgres:16-alpine
    container_name: pawmap-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pawmap}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pawmap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pawmap}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    container_name: pawmap-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pawmap}
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "python -m app.db bootstrap && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    container_name: pawmap-web
    environment:
      PAWMAP_API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - pawmap-web-node-modules:/app/node_modules
      - pawmap-web-next:/app/.next

volumes:
  pawmap-postgres-data:
  pawmap-web-node-modules:
  pawmap-web-next:
