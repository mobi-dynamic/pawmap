services:
  postgres:
    image: postgres:16-alpine
    container_name: pawmap-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pawmap}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pawmap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pawmap}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    container_name: pawmap-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pawmap}
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "python -m app.db bootstrap && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          urllib.request.urlopen('http://127.0.0.1:8000/health')
          sys.exit(0)
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
volumes:
  pawmap-postgres-data:
