databases:
  - name: pawmap-db
    plan: free
    databaseName: pawmap
    user: pawmap

services:
  - type: web
    name: pawmap-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -e '.[dev]'
    startCommand: python -m app.db bootstrap && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pawmap-db
          property: connectionString
